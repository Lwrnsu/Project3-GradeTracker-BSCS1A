<!DOCTYPE html>
<html>
    <head>
        <title>Student Grade Tracker</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/home_page/style.css">
        <link rel="stylesheet" href="css/components/nav.css">
    </head>
    <body>
        <nav id="nav">
            <img src="uploads/gc_logo.png" alt="Gordon College Logo">
            <p id="username">N/A</p>
            <ul>
                <li><button class="active" id="homeNav">Home</button></li>
                <li><button id="studentsNav">Students</button></li>
                <li><button id="subjectsNav">Subjects</button></li>
                <li><button id="gradesNav">Grades</button></li>
                <li><button id="accountNav">Account</button></li>
                <li><button class="logOut" id="logOutNav">Log Out</button></li>
            </ul>
        </nav>
        <main>
            <div class="top">
                <button class="menu_img" id="navToggleBtn">
                    <img src="uploads/menu.png" id="navImg">
                </button>
            </div>
            <div class="header">
                <h4 id="name">N/A</h4>
            </div>
            <div class="content_container">
                <div class="content">
                    <div class="content_cards">
                    <p>Total number of students.</p>
                    <p id="totalStudents">N/A</p>
                </div>
                <div class="content_cards">
                    <p>Total number of subjects.</p>
                    <p id="totalSubjects">N/A</p>
                </div>
                <div class="content_cards">
                    <p>Number of students passing.</p>
                    <p id="totalPassing">N/A</p>
                </div>
                <div class="content_cards">
                    <p>Number of students failing.</p>
                    <p id="totalFailing">N/A</p>
                </div>
            </div>
        </main>

        <script src="js/components/security.js"></script>
        <script src="js/components/nav.js"></script>
        <script src="js/pages/homePage.js"></script>
    </body>
</html>
